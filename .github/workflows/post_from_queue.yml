name: Post from Queue (Engagement Peak)

# Postet das ÄLTESTE vorgenerierten Carousel aus queue/ zu Instagram.
# Läuft 2x täglich zur Engagement-Peak-Zeit der DE-Audience:
#   08:00 UTC = 09:00 Uhr DE (Winter) / 10:00 Uhr DE (Sommer) — Morgen-Routine
#   16:00 UTC = 17:00 Uhr DE (Winter) / 18:00 Uhr DE (Sommer) — Feierabend
#
# Nutzt vor-uploaded Cloudinary URLs aus queue/POST_*.json (siehe generate_carousels.yml).
# KEINE Generation hier — nur API-Call zu IG. Sehr schnell (~1-2 Min).

on:
  workflow_dispatch:
    inputs:
      pick:
        description: "Bestimmtes Queue-File posten (Name, z.B. POST_20260502_0200.json). Leer = ältestes."
        required: false
        default: ""
      dry_run:
        description: "Dry-Run (zeigt nur was gepostet würde)"
        type: boolean
        default: false

  schedule:
    - cron: "0 8 * * *"   # 09/10 Uhr DE — Morgen-Post
    - cron: "0 16 * * *"  # 17/18 Uhr DE — Abend-Post

permissions:
  contents: write
  actions: write   # required so auto-disable step can stop the cron on Meta-block

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          pip install --upgrade pip
          pip install requests python-dotenv

      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          IG_USER_ACCESS_TOKEN=${{ secrets.IG_USER_ACCESS_TOKEN }}
          FB_PAGE_ACCESS_TOKEN=${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID=${{ secrets.FB_PAGE_ID }}
          IG_USER_ID=${{ secrets.IG_USER_ID }}
          EOF

      - name: Post oldest queued carousel
        id: post_step
        env:
          PICK: ${{ github.event.inputs.pick }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS=""
          if [ -n "$PICK" ]; then ARGS="$ARGS --pick $PICK"; fi
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          set +e
          python post_from_queue.py $ARGS
          POST_EXIT_CODE=$?
          echo "post_exit_code=$POST_EXIT_CODE" >> "$GITHUB_OUTPUT"
          # Exit-Code 78 = Meta-Auth-Block detected (190/200) — let next step handle
          if [ "$POST_EXIT_CODE" -eq 78 ]; then
            echo "::warning::Meta-Auth-Block detected — auto-disabling cron schedules"
            exit 0   # Don't fail the workflow yet, let auto-disable run
          fi
          exit $POST_EXIT_CODE

      - name: Auto-Disable cron schedules on Meta-Auth-Block
        if: steps.post_step.outputs.post_exit_code == '78'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Meta-Auth-Block detected — disabling cron schedules to prevent API hammering"
          gh workflow disable post_from_queue.yml --repo ${{ github.repository }} || true
          gh workflow disable generate_carousels.yml --repo ${{ github.repository }} || true
          echo "::error::Cron auto-disabled. Account locked or token revoked."
          echo "::error::Re-enable via: gh workflow enable post_from_queue.yml --repo ${{ github.repository }}"
          echo "::error::Re-enable via: gh workflow enable generate_carousels.yml --repo ${{ github.repository }}"
          exit 1

      - name: Commit posted/ + queue/ changes
        if: success()
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          mkdir -p queue posted
          git add -A queue/ posted/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "Posted from queue $(date -u +%Y-%m-%d-%H%M)"
          git push
          echo "=== push successful ==="

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "🚨 Auto Run Bug — Post from Queue failed"
          to: makevision1412@gmail.com
          from: HealthRecode Pipeline <${{ secrets.SMTP_USER }}>
          body: |
            ❌ Post-from-Queue Workflow ist gescheitert.
            ⚠️ KRITISCH: Geplanter IG-Post nicht raus — File bleibt in queue/ für Retry.

            Workflow:    ${{ github.workflow }}
            Repository:  ${{ github.repository }}
            Trigger:     ${{ github.event_name }}
            Branch:      ${{ github.ref_name }}
            Commit:      ${{ github.sha }}

            🔗 LOG ANSEHEN:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Häufigste Ursachen:
            • IG_USER_ACCESS_TOKEN abgelaufen → refresh_ig_token Workflow manuell starten
            • IG-Account suspended/restricted → Instagram App checken
            • FB_PAGE_ACCESS_TOKEN expired → neuen vom Graph Explorer holen
            • Cloudinary URLs nicht erreichbar → URL manuell testen
            • IG Container processing ERROR → image_urls validieren

            Manuell retry:
            • GitHub → Actions → Post from Queue → Run workflow
            • Falls Token expired: erst refresh_token Workflow, dann post

            Auto-Pipeline (don't reply)

      - name: Send success email (with post details)
        if: success()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "✅ Auto-Post live — HealthRecode"
          to: makevision1412@gmail.com
          from: HealthRecode Pipeline <${{ secrets.SMTP_USER }}>
          body: |
            ✅ Carousel ist live auf Instagram + Facebook!

            🔗 IG-Profile checken:
            https://www.instagram.com/healthrecode/

            Workflow-Run (für Details):
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Posted-Files (mit IG/FB-IDs):
            ${{ github.server_url }}/${{ github.repository }}/tree/main/posted

            Auto-Pipeline (don't reply)

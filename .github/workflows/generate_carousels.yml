name: Generate Carousels + Reels (Off-Peak)

# Läuft täglich um 02:00 UTC = 03:00 Uhr DE
# Generiert 2 Carousels + 2 Reels pro Lauf.
# Reels = selbe Pexels-Bilder + edge-tts Voice + Ken-Burns-Zoom
# Carousel (POST_*.json) + Reel (REEL_*.json) landen in queue/

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic (überschreibt topics.txt). Leer = nimmt erste(s) aus topics.txt"
        required: false
        default: ""
      count:
        description: "Anzahl Carousel+Reel Paare (Default 2)"
        required: false
        default: "2"
      skip_reel:
        description: "Reel-Generation überspringen? (true/false)"
        required: false
        default: "false"

  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-v1

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Write .env from secrets
        run: |
          cat > .env <<EOF
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}
          TOGETHER_API_KEY=${{ secrets.TOGETHER_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID=${{ secrets.GOOGLE_CSE_ID }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          IG_USER_ACCESS_TOKEN=${{ secrets.IG_USER_ACCESS_TOKEN }}
          FB_PAGE_ACCESS_TOKEN=${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID=${{ secrets.FB_PAGE_ID }}
          IG_USER_ID=${{ secrets.IG_USER_ID }}
          IG_APP_ID=${{ secrets.IG_APP_ID }}
          IG_APP_SECRET=${{ secrets.IG_APP_SECRET }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          EOF

      - name: Auto-refill topics
        run: python refill_topics.py --min 50 --target 100

      - name: Generate carousels + reels
        env:
          TOPIC_OVERRIDE: ${{ github.event.inputs.topic }}
          COUNT: ${{ github.event.inputs.count || '2' }}
          SKIP_REEL: ${{ github.event.inputs.skip_reel || 'false' }}
        run: |
          if [ -n "$TOPIC_OVERRIDE" ]; then
            echo "=== Carousel (single topic) ==="
            python cloud_pipeline.py "$TOPIC_OVERRIDE" --upload --save-to-queue
            if [ "$SKIP_REEL" != "true" ]; then
              echo "=== Reel (single topic) ==="
              python reel_pipeline.py --save-to-queue || echo "Reel fehlgeschlagen — weiter"
            fi
          else
            for i in $(seq 1 $COUNT); do
              echo "=== Carousel $i/$COUNT ==="
              python cloud_pipeline.py --from-queue topics.txt --upload --save-to-queue || { echo "Carousel $i fehlgeschlagen — weiter"; continue; }
              if [ "$SKIP_REEL" != "true" ]; then
                echo "=== Reel $i/$COUNT ==="
                python reel_pipeline.py --save-to-queue || echo "Reel $i fehlgeschlagen — weiter"
              fi
              sleep 5
            done
          fi

      - name: Debug — show queue
        if: always()
        run: |
          echo "=== queue/ ==="
          ls -la queue/ 2>/dev/null || echo "queue/ leer"
          echo "=== git status ==="
          git status

      - name: Commit queue + topics + summary
        if: success()
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          mkdir -p queue output
          git add -A topics.txt queue/ output/summary_*.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "Auto-generate $(date -u +%Y-%m-%d) — carousel + reel"
          git push

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-content
          path: |
            output/*.png
            output/summary_*.json
            output/reel_*.mp4
            queue/*.json
          retention-days: 14

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "Auto Run Bug — Generate Carousels+Reels failed"
          to: makevision1412@gmail.com
          from: HealthRecode Pipeline <${{ secrets.SMTP_USER }}>
          body: |
            Generate Carousels+Reels Workflow ist gescheitert.

            Workflow: ${{ github.workflow }}
            Trigger: ${{ github.event_name }}

            LOG: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Auto-Pipeline (don't reply)
